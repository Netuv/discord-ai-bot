# Remote Terminal via GitHub Actions
# Dipanggil oleh Discord MCP Bot via GitHub API
name: Remote Run

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Perintah terminal yang akan dijalankan'
        required: true
        type: string
      shell:
        description: 'Shell (bash/pwsh)'
        required: false
        default: 'bash'
        type: string
      working_directory:
        description: 'Working directory'
        required: false
        default: '.'
        type: string
      run_id:
        description: 'Run ID untuk tracking progress'
        required: true
        type: string

jobs:
  execute:
    name: Jalankan Perintah
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Info Eksekusi
        run: |
          echo "Run ID: ${{ inputs.run_id }}"
          echo "Working dir: ${{ inputs.working_directory }}"
          echo "Shell: ${{ inputs.shell }}"

      - name: Set Working Directory
        working-directory: ${{ inputs.working_directory }}
        run: |
          echo "PWD: $(pwd)"
          echo "User: $(whoami)"
          echo "Node: $(node --version 2>&1)"
          echo "NPM: $(npm --version 2>&1)"

      - name: Eksekusi Command
        id: execute
        working-directory: ${{ inputs.working_directory }}
        run: |
          echo "Running: ${{ inputs.command }}"
          echo "---OUTPUT---"
          ${{ inputs.command }} 2>&1
          echo "---EXIT: $?---"
          echo "EXIT_CODE=$?" >> $GITHUB_ENV

      - name: Hasil Akhir
        if: always()
        run: |
          echo "Exit Code: ${{ env.EXIT_CODE }}"
          echo "Run ID: ${{ inputs.run_id }}"

# FEATURE 2026-06-19: Remote Terminal via GitHub Actions
# Dipanggil oleh Discord MCP Bot via GitHub API
name: Remote Run

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Perintah terminal yang akan dijalankan'
        required: true
        type: string
      shell:
        description: 'Shell (bash/pwsh)'
        required: false
        default: 'bash'
        type: string
      working_directory:
        description: 'Working directory'
        required: false
        default: '.'
        type: string
      run_id:
        description: 'Run ID untuk tracking progress'
        required: true
        type: string

jobs:
  execute:
    name: Jalankan Perintah
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Set Run ID
        run: echo "RUN_ID=${{ inputs.run_id }}" >> $GITHUB_ENV

      - name: 🚀 Mulai Eksekusi
        run: |
          echo "### 🚀 Remote Run dimulai" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID:** \`${{ inputs.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Command:** \`${{ inputs.command }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Shell:** ${{ inputs.shell }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Directory:** ${{ inputs.working_directory }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 📂 Set Working Directory
        working-directory: ${{ inputs.working_directory }}
        run: |
          echo "📂 Working directory: $(pwd)"
          echo "👤 User: $(whoami)"
          echo "🖥️ Host: $(hostname)"

      - name: 💻 Eksekusi Command
        id: execute
        working-directory: ${{ inputs.working_directory }}
        shell: ${{ inputs.shell }}
        run: |
          echo "⏳ Menjalankan: ${{ inputs.command }}"
          echo "────────────────────────"
          
          # Jalankan command dan capture output
          {
            echo "### ✅ Output" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            ${{ inputs.command }} 2>&1 | tee -a $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          }
          
          # Simpan exit code
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: 📊 Hasil Akhir
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Hasil" >> $GITHUB_STEP_SUMMARY
          echo "- **Exit Code:** \`${{ env.EXIT_CODE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID:** \`${{ inputs.run_id }}\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ env.EXIT_CODE }}" = "0" ]; then
            echo "- **Status:** ✅ Berhasil" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status:** ❌ Gagal" >> $GITHUB_STEP_SUMMARY
          fi
